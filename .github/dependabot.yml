# Dependabot — weekly dependency surveillance.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# Three ecosystems are watched:
#   - uv             → Python deps in pyproject.toml + uv.lock
#   - github-actions → action versions pinned in .github/workflows
#   - docker         → the base image in the Dockerfile
#
# Routine minor/patch bumps are grouped into a single PR per ecosystem to keep
# review noise low; MAJOR bumps open their own PR so a breaking change is reviewed
# in isolation. Every PR runs the full CI lane (lint, types, import boundaries,
# 100% coverage ratchet, pip-audit, detect-secrets) before it can merge — so a bump
# that breaks a gate is caught automatically, not in production.
version: 2
updates:
  # ── Python (uv: pyproject.toml + uv.lock) ───────────────────────────────────
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Australia/Melbourne"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      python-production-minor:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      python-development-minor:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  # ── GitHub Actions (workflow action versions) ───────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Australia/Melbourne"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ── Docker base image (Dockerfile) ──────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Australia/Melbourne"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
