name: Build and push agent images

# Builds one container image per agent and pushes to GHCR (ADR-0011).
# Push needs no secret — the workflow GITHUB_TOKEN with packages:write is enough.
# Pull (by Azure Container Apps) uses the GHCR_PAT secret, set separately.

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "kernel/**"
      - "contracts/**"
      - "orchestration/**"
      - "scripts/dispatch_scheduled_run.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag to publish for a manual branch build"
        required: true
        default: "manual"

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: master
            dockerfile: agents/master/Dockerfile
          - image: scanner
            dockerfile: agents/scanner/Dockerfile
          - image: analyst
            dockerfile: agents/analyst/Dockerfile
          - image: portfolio_manager
            dockerfile: agents/portfolio_manager/Dockerfile
          - image: execution
            dockerfile: agents/execution/Dockerfile
          - image: monitor
            dockerfile: agents/monitor/Dockerfile
          - image: reporter
            dockerfile: agents/reporter/Dockerfile
          - image: forecaster
            dockerfile: agents/forecaster/Dockerfile
          - image: operator
            dockerfile: agents/operator/Dockerfile
          - image: supervisor
            dockerfile: agents/supervisor/Dockerfile
          - image: curator
            dockerfile: agents/curator/Dockerfile
          - image: researcher
            dockerfile: agents/researcher/Dockerfile
          - image: provider
            dockerfile: agents/provider/Dockerfile
          - image: dispatcher
            dockerfile: orchestration/Dockerfile

    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/trading-agents-${{ matrix.image }}:${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || 'latest' }}
            ghcr.io/${{ github.repository_owner }}/trading-agents-${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
