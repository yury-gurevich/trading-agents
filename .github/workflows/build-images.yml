name: Build and push agent images

# Builds one container image per agent and pushes to GHCR (ADR-0011).
# Push needs no secret — the workflow GITHUB_TOKEN with packages:write is enough.
# Pull (by Azure Container Apps) uses the GHCR_PAT secret, set separately.

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "kernel/**"
      - "contracts/**"
      - "orchestration/**"
      - "scripts/dispatch_scheduled_run.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag to publish for a manual branch build"
        required: true
        default: "manual"

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: master
            dockerfile: agents/master/Dockerfile
          - image: scanner
            dockerfile: agents/scanner/Dockerfile
          - image: analyst
            dockerfile: agents/analyst/Dockerfile
          - image: portfolio_manager
            dockerfile: agents/portfolio_manager/Dockerfile
          - image: execution
            dockerfile: agents/execution/Dockerfile
          - image: monitor
            dockerfile: agents/monitor/Dockerfile
          - image: reporter
            dockerfile: agents/reporter/Dockerfile
          - image: forecaster
            dockerfile: agents/forecaster/Dockerfile
          - image: operator
            dockerfile: agents/operator/Dockerfile
          - image: supervisor
            dockerfile: agents/supervisor/Dockerfile
          - image: curator
            dockerfile: agents/curator/Dockerfile
          - image: researcher
            dockerfile: agents/researcher/Dockerfile
          - image: provider
            dockerfile: agents/provider/Dockerfile
          - image: dispatcher
            dockerfile: orchestration/Dockerfile

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push ${{ matrix.image }}
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/trading-agents-${{ matrix.image }}:${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || 'latest' }}
            ghcr.io/${{ github.repository_owner }}/trading-agents-${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Trivy HIGH/CRITICAL image scan ${{ matrix.image }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/trading-agents-${{ matrix.image }}@${{ steps.build.outputs.digest }}
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          trivyignores: .trivyignore

      - name: Provider missing-config smoke
        if: matrix.image == 'provider'
        shell: bash
        run: |
          set +e
          output=$(docker run --rm ghcr.io/${{ github.repository_owner }}/trading-agents-provider@${{ steps.build.outputs.digest }} 2>&1)
          code=$?
          printf '%s\n' "$output"
          if [ "$code" -eq 0 ]; then
            echo "provider image started without required activation config"
            exit 1
          fi
          printf '%s\n' "$output" | grep -Eq 'master|MASTER_URL|urlopen|Name or service|Connection refused|Temporary failure'
