name: Build and push agent images

# Builds one container image per agent and pushes to GHCR (ADR-0011).
# Push needs no secret — the workflow GITHUB_TOKEN with packages:write is enough.
# Pull (by Azure Container Apps) uses the GHCR_PAT secret, set separately.

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "kernel/**"
      - "contracts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        agent:
          - master
          - scanner
          - analyst
          - portfolio_manager
          - execution
          - monitor
          - reporter
          - forecaster
          - operator
          - supervisor
          - curator
          - researcher
          - provider

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.agent }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agents/${{ matrix.agent }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/trading-agents-${{ matrix.agent }}:latest
            ghcr.io/${{ github.repository_owner }}/trading-agents-${{ matrix.agent }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.agent }}
          cache-to: type=gha,mode=max,scope=${{ matrix.agent }}
