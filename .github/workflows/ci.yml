name: CI

on:
  push:
    branches: ["**", "!backup/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: jobs only read the checkout. No job here writes to the repo,
# publishes packages, or touches deployments — so default-deny everything else.
permissions:
  contents: read

jobs:
  # ── Lint + types + boundaries (fast) ──────────────────────────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check . --output-format=github
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy kernel contracts agents orchestration surfaces
      - name: import-linter (agents are islands)
        run: uv run lint-imports
      - name: Module size guard
        run: uv run python scripts/check_module_size.py kernel contracts agents orchestration surfaces tests
      - name: Module header guard
        run: uv run python scripts/check_module_header.py kernel contracts agents scripts

      # Prove the gates can fail. A check that has never been observed rejecting
      # anything is not known to work — three read green while examining nothing
      # on 2026-07-22 (DL-52/54/55). Plants a violation per gate, requires a
      # non-zero exit, and asserts the config facts that keep gates enabled.
      # Runs here so it cannot rot: every push exercises it.
      - name: Gate self-test (can each gate fail?)
        run: uv run python scripts/gate_selftest.py

  # ── Tests + coverage ratchet ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --frozen
      - name: Tests + coverage floor
        run: uv run pytest -m "not llm_qualification and not live"

  # ── Security audit ────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    env:
      GHAS_ENABLED: "true"
    permissions:
      contents: read
      actions: read
      pull-requests: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          vulnerability-check: true
          deny-packages: pkg:pypi/pycrypto
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --frozen
      - name: pip-audit (Python vulnerabilities)
        run: uv run pip-audit
      - name: detect-secrets
        run: uv run pre-commit run detect-secrets --all-files
      - name: Initialize CodeQL
        if: env.GHAS_ENABLED == 'true'
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: python
          build-mode: none
          queries: security-and-quality
      - name: Perform CodeQL analysis
        if: env.GHAS_ENABLED == 'true'
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:python"
      - name: CodeQL status note
        if: env.GHAS_ENABLED != 'true'
        run: |
          echo "CodeQL skipped in CI security job."
          echo "Set jobs.security.env.GHAS_ENABLED=true after GHAS/code scanning is enabled."

  # ── No migration job: ADR-0001 makes Neo4j the single schema-flexible store ─
  # A future Neo4j service lane may exercise integration tests with NEO4J_TEST_URI.
  # ── Dormant until execution stage gates land (build-plan P8) ───────
  # promotion_check: trust-to-stage gate preview
