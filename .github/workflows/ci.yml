name: CI

on:
  push:
    branches: ["**", "!backup/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: jobs only read the checkout. No job here writes to the repo,
# publishes packages, or touches deployments — so default-deny everything else.
permissions:
  contents: read

jobs:
  # ── Lint + types + boundaries (fast) ──────────────────────────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check . --output-format=github
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy kernel contracts agents orchestration surfaces
      - name: import-linter (agents are islands)
        run: uv run lint-imports
      - name: Module size guard
        run: uv run python scripts/check_module_size.py kernel contracts agents orchestration surfaces tests
      - name: Module header guard
        run: uv run python scripts/check_module_header.py kernel contracts agents scripts

  # ── Tests + coverage ratchet ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - run: uv sync --frozen
      - name: Tests + coverage floor
        run: uv run pytest -m "not llm_qualification and not live"

  # ── Security audit ────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - run: uv sync --frozen
      - name: pip-audit (Python vulnerabilities)
        run: uv run pip-audit
      - name: detect-secrets
        run: uv run pre-commit run detect-secrets --all-files

  # ── No migration job: ADR-0001 makes Neo4j the single schema-flexible store ─
  # A future Neo4j service lane may exercise integration tests with NEO4J_TEST_URI.
  # ── Dormant until execution stage gates land (build-plan P8) ───────
  # promotion_check: trust-to-stage gate preview
