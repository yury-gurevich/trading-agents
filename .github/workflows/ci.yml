name: CI

on:
  push:
    branches: ["**", "!backup/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint + types + boundaries (fast) ──────────────────────────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check . --output-format=github
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy kernel contracts agents orchestration surfaces
      - name: import-linter (agents are islands)
        run: uv run lint-imports
      - name: Module size guard
        run: uv run python scripts/check_module_size.py kernel contracts agents orchestration surfaces tests
      - name: Module header guard
        run: uv run python scripts/check_module_header.py kernel contracts agents scripts

  # ── Tests + coverage ratchet ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen
      - name: Tests + coverage floor
        run: uv run pytest -m "not llm_qualification and not live"

  # ── Security audit ────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen
      - name: pip-audit (Python vulnerabilities)
        run: uv run pip-audit
      - name: detect-secrets
        run: uv run pre-commit run detect-secrets --all-files

  # ── Dormant until the persistence layer lands (build-plan P1) ──────
  # migration:    relational schema migrate + drift check (needs a test DB secret)
  # ── Dormant until execution stage gates land (build-plan P8) ───────
  # promotion_check: trust-to-stage gate preview
