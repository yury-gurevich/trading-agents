name: CI

on:
  push:
    branches: ["**", "!backup/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: jobs only read the checkout. No job here writes to the repo,
# publishes packages, or touches deployments — so default-deny everything else.
permissions:
  contents: read

jobs:
  # ── Lint + types + boundaries (fast) ──────────────────────────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check . --output-format=github
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy kernel contracts agents orchestration surfaces
      - name: import-linter (agents are islands)
        run: uv run lint-imports
      - name: Module size guard
        run: uv run python scripts/check_module_size.py kernel contracts agents orchestration surfaces tests
      - name: Module header guard
        run: uv run python scripts/check_module_header.py kernel contracts agents scripts

  # ── Tests + coverage ratchet ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --frozen
      - name: Tests + coverage floor
        run: uv run pytest -m "not llm_qualification and not live"

  # ── Security audit ────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    env:
      GHAS_ENABLED: "true"
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --frozen
      - name: pip-audit (Python vulnerabilities)
        run: uv run pip-audit
      - name: detect-secrets
        run: uv run pre-commit run detect-secrets --all-files
      - name: Initialize CodeQL
        if: env.GHAS_ENABLED == 'true'
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python
          build-mode: none
          queries: security-and-quality
      - name: Perform CodeQL analysis
        if: env.GHAS_ENABLED == 'true'
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:python"
      - name: CodeQL status note
        if: env.GHAS_ENABLED != 'true'
        run: |
          echo "CodeQL skipped in CI security job."
          echo "Set jobs.security.env.GHAS_ENABLED=true after GHAS/code scanning is enabled."

  # ── No migration job: ADR-0001 makes Neo4j the single schema-flexible store ─
  # A future Neo4j service lane may exercise integration tests with NEO4J_TEST_URI.
  # ── Dormant until execution stage gates land (build-plan P8) ───────
  # promotion_check: trust-to-stage gate preview
