name: CodeQL

# Code-level static analysis (SAST) — complements pip-audit, which only covers
# dependency CVEs. Runs on pushes/PRs to main and a weekly scheduled deep scan.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 05:30 UTC (~weekly), offset from the Dependabot run.
    - cron: "30 5 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      # Required for CodeQL to upload findings to the Security tab.
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python
          build-mode: none
          queries: security-and-quality
          config-file: .github/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:python"
