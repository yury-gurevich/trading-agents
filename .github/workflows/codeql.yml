name: CodeQL

# Code-level static analysis (SAST) — complements pip-audit, which only covers
# dependency CVEs. Runs on pushes/PRs to main and a weekly scheduled deep scan.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 05:30 UTC (~weekly), offset from the Dependabot run.
    - cron: "30 5 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      # Required for CodeQL to upload findings to the Security tab.
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: python
          build-mode: none
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: "/language:python"
