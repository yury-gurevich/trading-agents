name: Dependabot auto-merge

# Keeps routine dependency PRs out of the human loop. For non-major Dependabot
# updates, this enables GitHub auto-merge, so the PR merges itself once the
# required CI checks (quality, test, security) pass. MAJOR updates are
# deliberately left open for a human to look at — they can change behaviour.
#
# No approval step: `main` requires status checks but NOT a review, and the
# Actions GITHUB_TOKEN is hard-blocked from approving PRs by GitHub, so
# `gh pr review --approve` always fails. Auto-merge alone is sufficient here.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Enable auto-merge for non-major updates
        if: ${{ steps.meta.outputs.update-type != 'version-update:semver-major' }}
        run: |
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
