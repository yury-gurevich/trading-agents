# Security Findings — ENFORCING ratchet (since 2026-07-04).
#
# Collects this repo's open GitHub code-scanning alerts and compares them to a
# committed baseline (security/findings-baseline.json). A NEW error-severity
# code-scanning finding (not in the baseline) FAILS the PR
# (`--fail-on-code-scanning-error`); everything is also reported in the job
# summary so lesser findings do not accumulate silently. The baseline was
# refreshed 2026-07-04 after the CodeQL clearance (0 open code-scanning alerts;
# the single baselined entry is the operator-accepted diskcache Dependabot
# advisory). Report-only history: PR #25 (introduced), PR #26 (cleared the 3
# blocking cyclic-import errors).
#
# Requires a repository secret SECURITY_FINDINGS_TOKEN: a PAT that can read the
# (private) security-findings-toolset repo, used only to fetch the tool. A
# fine-grained PAT scoped to that one repo with Contents: Read is enough. The
# token is embedded in the git URL (uv does not honour git insteadOf); the
# "Prepare tool spec" step strips any stray whitespace and re-masks it.
#
# To tighten further: `--fail-on-security-severity-at-least 7.0`, or gate
# Dependabot by giving the PAT security_events read, passing it as GITHUB_TOKEN
# to collect, and re-baselining. To accept a finding: dismiss it in the GitHub
# Security tab with a reason (preferred), or re-baseline deliberately.
name: Security Findings

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: security-findings-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: read the checkout + read code-scanning alerts. Nothing else.
permissions:
  contents: read
  security-events: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # Build the authenticated tool URL. Strip stray whitespace/newlines from
      # the pasted secret (a common cause of "Malformed input to a URL"), then
      # re-mask the cleaned value and hand it to later steps via GITHUB_ENV.
      - name: Prepare tool spec
        env:
          TOOL_TOKEN: ${{ secrets.SECURITY_FINDINGS_TOKEN }}
        run: |
          T=$(printf '%s' "$TOOL_TOKEN" | tr -d '[:space:]')
          echo "::add-mask::$T"
          echo "TOOL_SPEC=git+https://x-access-token:${T}@github.com/yury-gurevich/security-findings-toolset@main" >> "$GITHUB_ENV"

      - name: Collect open findings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          uvx --from "$TOOL_SPEC" security-findings collect github
          --repo "${{ github.repository }}"
          --output security-findings-current.json

      - name: Gate against baseline (enforcing — new error-level code-scanning fails)
        run: >
          uvx --from "$TOOL_SPEC" security-findings gate
          --findings security-findings-current.json
          --baseline security/findings-baseline.json
          --fail-on-code-scanning-error
          --report-md security-findings-report.md
          --report-json security-findings-report.json

      - name: Publish report to job summary
        if: always()
        run: >
          cat security-findings-report.md >> "$GITHUB_STEP_SUMMARY"
          || echo "Gate produced no report (tool unavailable or collect failed) — see step logs." >> "$GITHUB_STEP_SUMMARY"
