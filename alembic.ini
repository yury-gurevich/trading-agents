# Alembic configuration for the trading-agents relational store.
# The URL is intentionally left blank here — env.py reads it from
# PersistenceSettings (which honours DATABASE_URL from the environment or .env).

[alembic]
# Path to migration scripts
script_location = alembic

# Template for revision file names
file_template = %%(rev)s_%%(slug)s

# Timezone for the 'create_date' in migration files
timezone = UTC

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
