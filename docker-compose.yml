# Docker Compose / Docker Swarm stack for trading-agents + Prometheus sidecar.
#
# Local dev:
#   docker compose up
#
# Swarm stack deploy:
#   docker build -t trading-agents:local .
#   docker swarm init            # once, if not already a swarm node
#   docker stack deploy -c docker-compose.yml trading-agents
#
# Access:
#   App /metrics:   http://localhost:8000/metrics
#   Prometheus UI:  http://localhost:9090
#
# To enable Azure remote_write: replace the configs.prometheus_config.file
# reference with infra/prometheus/prometheus.local.yml (generated by
# infra/setup-prometheus-auth.ps1, gitignored).

name: trading-agents

services:

  app:
    build: .
    image: trading-agents:local
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    networks:
      - observability
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/metrics', timeout=3)"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 512M

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    networks:
      - observability
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2d
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://localhost:9090/-/healthy || exit 1"
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 5
      resources:
        limits:
          memory: 256M

networks:
  observability:
    driver: bridge

configs:
  prometheus_config:
    file: ./infra/prometheus/prometheus.compose.yml
