# Local dev runner for trading-agents.
#
# The observability sidecar (Prometheus/Grafana) has been retired (ADR-0009, 2026-06-19).
# Metrics are written by prometheus-client → Azure Managed Prometheus remote-write.
# Deployed infra: Azure Container Apps — see infra/container-apps.bicep.
#
# Local dev:
#   docker compose up
#
# Swarm stack deploy:
#   docker build -t trading-agents:local .
#   docker swarm init            # once, if not already a swarm node
#   docker stack deploy -c docker-compose.yml trading-agents

name: trading-agents

services:

  app:
    build: .
    image: trading-agents:local
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/metrics', timeout=3)"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 512M
