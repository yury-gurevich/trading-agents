# Local Neo4j graph store — single container, the system's primary store (ADR-0001),
# hosted in Docker per ADR-0008. Deploy as a Portainer stack or: `docker compose up -d`
# from this directory. Credentials are interpolated from a gitignored `infra/neo4j/.env`
# (copy `.env.example`) — no secret is committed here.
#
# Edition: ENTERPRISE during development (free dev/eval license) for online backup,
# point-in-time restore, named databases, RBAC and CDC — see ADR-0008. The APPLICATION
# is kept Community-portable on purpose (no Enterprise-only feature in agent logic), so we
# can drop to Community later if the production license cost is not justified. To run
# Community instead: image `neo4j:<ver>-community`, drop NEO4J_ACCEPT_LICENSE_AGREEMENT,
# set NEO4J_DATABASE=neo4j (Community exposes only the default db).
services:
  neo4j:
    image: neo4j:2025.08-enterprise # pin to a digest once verified (docker pull)
    container_name: trading-agents-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP / Neo4j Browser
      - "7687:7687" # Bolt (the app connects here)
    environment:
      # Enterprise dev/eval license — free for development/test, NOT production.
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "eval"
      # neo4j/<password>; NEO4J_LOCAL_PASSWORD comes from infra/neo4j/.env (gitignored).
      NEO4J_AUTH: "neo4j/${NEO4J_LOCAL_PASSWORD:?set NEO4J_LOCAL_PASSWORD in infra/neo4j/.env}"
      # Modest footprint for a dev box; tune as the graph grows (edition-agnostic).
      NEO4J_server_memory_pagecache_size: "512m"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - neo4j-data:/data # the graph store — survives container recreation
      - neo4j-logs:/logs
      - neo4j-backups:/backups # online backups land here (Enterprise) — ADR-0008
    healthcheck:
      # Password is interpolated by compose at parse time (host-side), so no secret in
      # this committed file; it is baked into the running container's healthcheck only.
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p \"${NEO4J_LOCAL_PASSWORD}\" 'RETURN 1' >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

volumes:
  neo4j-data:
  neo4j-logs:
  neo4j-backups:
