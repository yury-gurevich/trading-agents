# Local Neo4j Enterprise (dev/eval) + graph plugins — APOC and Graph Data Science (GDS).
#
# Self-contained stack: data, config, logs, plugins and import all BIND-MOUNT into this
# directory, so you can browse and edit them straight from the filesystem.
#
# !! WSL2 RULE: this file MUST be run from the Ubuntu filesystem (e.g. ~/...).
#    The ./data and ./logs bind mounts are I/O-intensive — Neo4j writes every
#    transaction here. Running from /mnt/c/... crosses the 9P virtio-fs boundary
#    and causes severe write latency. Clone the repo into WSL2's native filesystem
#    (ext4) before starting this stack.
#
#   cd infra/neo4j/local && docker compose up -d   # <- run inside WSL2 Ubuntu
#   Browser : http://localhost:7474
#   Bolt    : bolt://localhost:7687
#   Login   : neo4j / qR8mK#2pL!7nZx@4vT9b
#   Default database : traiding-agents   (the 'neo4j' database is never created)
#
# Enterprise is REQUIRED here: only Enterprise supports a named default database — Community
# exposes the single 'neo4j' database. The "eval" license is free for development and
# testing only, NOT production.
#
# NOTE: the password is committed inline below because you asked for it in the file. For a
# shared/committed setup, move it to a gitignored .env and use ${NEO4J_LOCAL_PASSWORD}
# interpolation instead (see ../docker-compose.yml for that pattern).
services:
  neo4j:
    image: neo4j:enterprise # latest Enterprise. Pin e.g. neo4j:2025.08-enterprise for reproducible plugin builds.
    container_name: trading-agents-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP / Neo4j Browser
      - "7687:7687" # Bolt (the app connects here)
    environment:
      # --- License: free dev/eval, not for production ---
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "eval"

      # --- Credentials: neo4j / <20 chars: letters + digits + specials> ---
      NEO4J_AUTH: "neo4j/qR8mK#2pL!7nZx@4vT9b"

      # --- Graph plugins: auto-download a build matching the server version ---
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"

      # --- Default database = 'traiding-agents'; 'neo4j' is never created or used ---
      # 'initial.*' settings apply only at first startup, when the default db is created.
      NEO4J_initial_dbms_default__database: "traiding-agents"

      # --- Modest dev footprint; tune as the graph grows ---
      NEO4J_server_memory_pagecache_size: "512m"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - ./data:/data # the graph store — survives container recreation
      - ./conf:/conf # generated neo4j.conf lands here — editable on the host
      - ./logs:/logs # server + query logs
      - ./plugins:/plugins # apoc + gds jars are downloaded here on first start
      - ./import:/import # drop CSV/JSON here for LOAD CSV / apoc.import
      - ./backups:/backups # online backups land here (Enterprise)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p 'qR8mK#2pL!7nZx@4vT9b' -d traiding-agents 'RETURN 1' >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
