# Prometheus configuration for docker compose / docker stack deploy.
#
# Scrapes the app service by name (app:8000) — works on the shared compose
# network. For local dev with Azure remote_write, use prometheus.local.yml
# (generated by infra/setup-prometheus-auth.ps1, gitignored).
#
# To enable remote_write: uncomment the section below and fill credentials.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: trading-agents
    environment: local

scrape_configs:
  - job_name: trading_agents
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
    relabel_configs:
      - target_label: instance
        replacement: trading-agents-local

