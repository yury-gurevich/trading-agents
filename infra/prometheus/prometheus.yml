# Prometheus configuration for trading-agents observability sidecar.
#
# This file is templated: REMOTE_WRITE_URL and MANAGED_IDENTITY_CLIENT_ID
# are replaced at container build time by infra/deploy.sh.
# Do NOT commit a file with real values here.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: trading-agents
    environment: production

scrape_configs:
  - job_name: trading_agents
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      # Prometheus and trading-agents share the same container-app pod;
      # localhost:8000 is the trading-agents metrics endpoint.
      - targets: ["localhost:8000"]
    relabel_configs:
      - target_label: instance
        replacement: trading-agents-prod

remote_write:
  - url: "REMOTE_WRITE_URL"
    azuread:
      # Managed identity injected by Azure Container Apps at runtime.
      managed_identity:
        client_id: "MANAGED_IDENTITY_CLIENT_ID"
    queue_config:
      max_samples_per_send: 1000
      max_shards: 10
      capacity: 2500
    write_relabel_configs:
      - source_labels: [__name__]
        regex: "trading_agents_.*"
        action: keep
